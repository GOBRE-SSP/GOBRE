<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Demandas — Gerência de Obras e Engenharia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #1b3f72;
    --azul2: #2563a8;
    --azul-light: #e8f0fb;
    --amarelo: #f59e0b;
    --verde: #10b981;
    --vermelho: #ef4444;
    --cinza-bg: #f1f5f9;
    --cinza-borda: #dde3ec;
    --texto: #1a202c;
    --texto2: #64748b;
    --branco: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cinza-bg);
    color: var(--texto);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--azul);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(27,63,114,0.18);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-icon {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-title { color: white; font-size: 15px; font-weight: 700; line-height: 1.2; }
  .header-sub { color: rgba(255,255,255,0.65); font-size: 11px; font-weight: 400; }
  .header-date { color: rgba(255,255,255,0.7); font-size: 12px; font-family: 'DM Mono', monospace; }

  /* SUMMARY CARDS */
  .summary {
    display: flex;
    gap: 14px;
    padding: 22px 28px 12px;
    flex-wrap: wrap;
  }
  .scard {
    flex: 1;
    min-width: 120px;
    background: var(--branco);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border-top: 3px solid var(--cinza-borda);
    transition: transform 0.15s;
    cursor: default;
  }
  .scard:hover { transform: translateY(-2px); }
  .scard.total  { border-color: var(--azul2); }
  .scard.aberta { border-color: var(--amarelo); }
  .scard.andamento { border-color: #3b82f6; }
  .scard.concluida { border-color: var(--verde); }
  .scard.atrasada  { border-color: var(--vermelho); }
  .scard-num { font-size: 32px; font-weight: 700; line-height: 1; }
  .scard.total .scard-num { color: var(--azul2); }
  .scard.aberta .scard-num { color: var(--amarelo); }
  .scard.andamento .scard-num { color: #3b82f6; }
  .scard.concluida .scard-num { color: var(--verde); }
  .scard.atrasada .scard-num  { color: var(--vermelho); }
  .scard-label { font-size: 11px; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 4px; font-weight: 500; }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 10px;
    padding: 0 28px 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar input, .toolbar select {
    border: 1px solid var(--cinza-borda);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--texto);
    background: var(--branco);
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
  }
  .toolbar input { width: 260px; }
  .toolbar input:focus, .toolbar select:focus {
    border-color: var(--azul2);
    box-shadow: 0 0 0 3px rgba(37,99,168,0.1);
  }
  .btn-nova {
    margin-left: auto;
    background: var(--azul2);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.2px;
  }
  .btn-nova:hover { background: var(--azul); }
  .btn-nova:active { transform: scale(0.97); }

  /* TABLE */
  .table-wrap {
    margin: 0 28px 32px;
    background: var(--branco);
    border-radius: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--azul); }
  th {
    padding: 12px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
  }
  td {
    padding: 11px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--cinza-bg);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.12s; }
  tbody tr:hover td { background: #f0f7ff; }

  .sei-code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--azul);
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-status {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .st-Aberta      { background: #fef3c7; color: #92400e; }
  .st-Em_Andamento { background: #dbeafe; color: #1e40af; }
  .st-Concluída   { background: #d1fae5; color: #065f46; }
  .st-Atrasada    { background: #fee2e2; color: #991b1b; }

  .badge-prio {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .pr-Alta  { background: #fee2e2; color: #991b1b; }
  .pr-Média { background: #fef3c7; color: #92400e; }
  .pr-Baixa { background: #d1fae5; color: #065f46; }

  .badge-origem {
    display: inline-block;
    background: #f1f5f9;
    color: #475569;
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-tipo {
    display: inline-block;
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .tp-MP                { background: #ede9fe; color: #5b21b6; }
  .tp-Manutenção_Predial { background: #fce7f3; color: #9d174d; }
  .tp-Ar_Condicionado   { background: #e0f2fe; color: #0c4a6e; }
  .tp-Outros            { background: #f1f5f9; color: #475569; }

  .desc-cell {
    max-width: 210px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--texto2);
  }

  .btn-act {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    padding: 4px 6px;
    border-radius: 6px;
    transition: background 0.13s;
    line-height: 1;
  }
  .btn-act:hover { background: var(--cinza-bg); }

  .empty-row td { text-align: center; padding: 50px; color: var(--texto2); font-size: 14px; }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,20,40,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--branco);
    border-radius: 16px;
    padding: 30px 28px 24px;
    width: 540px;
    max-width: 96vw;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.18);
    animation: modalIn 0.18s ease;
  }
  @keyframes modalIn { from { opacity:0; transform: scale(0.96) translateY(8px); } to { opacity:1; transform: scale(1) translateY(0); } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .modal-header h2 { font-size: 17px; font-weight: 700; color: var(--azul); }
  .btn-close { background: var(--cinza-bg); border: none; border-radius: 6px; width:30px; height:30px; font-size:18px; cursor:pointer; color: var(--texto2); display:flex;align-items:center;justify-content:center; }
  .btn-close:hover { background: var(--cinza-borda); }

  .form-row { display: flex; gap: 14px; margin-bottom: 16px; }
  .fgroup { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .fgroup label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--texto2); }
  .fgroup input, .fgroup select, .fgroup textarea {
    border: 1px solid var(--cinza-borda);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--texto);
    background: #f8fafc;
    outline: none;
    transition: border 0.18s, box-shadow 0.18s;
  }
  .fgroup input:focus, .fgroup select:focus, .fgroup textarea:focus {
    border-color: var(--azul2);
    background: var(--branco);
    box-shadow: 0 0 0 3px rgba(37,99,168,0.1);
  }
  .fgroup textarea { resize: vertical; min-height: 68px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--cinza-bg); }
  .btn-cancel2 { background: var(--cinza-bg); color: var(--texto2); border: none; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .btn-cancel2:hover { background: var(--cinza-borda); }
  .btn-save { background: var(--azul2); color: white; border: none; border-radius: 8px; padding: 9px 24px; font-size: 13px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.18s; }
  .btn-save:hover { background: var(--azul); }

  /* RESPONSIVO */
  @media (max-width: 700px) {
    header, .summary, .toolbar, .table-wrap { padding-left: 14px; padding-right: 14px; }
    .toolbar input { width: 100%; }
    .table-wrap { margin: 0 14px 24px; }
    th:nth-child(3), td:nth-child(3),
    th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">🏗️</div>
    <div>
      <div class="header-title">Gestão de Demandas — Obras e Engenharia</div>
      <div class="header-sub">Secretaria de Segurança do Trabalho do Piauí</div>
    </div>
  </div>
  <div class="header-date" id="hdr-date"></div>
</header>

<div class="summary" id="summary"></div>

<div class="toolbar">
  <input type="text" id="busca" placeholder="🔍  Buscar por SEI, solicitante ou responsável…" oninput="render()">
  <select id="f-status" onchange="render()">
    <option value="">Todos os status</option>
    <option>Aberta</option>
    <option>Em Andamento</option>
    <option>Concluída</option>
    <option>Atrasada</option>
  </select>
  <select id="f-prio" onchange="render()">
    <option value="">Todas as prioridades</option>
    <option>Alta</option>
    <option>Média</option>
    <option>Baixa</option>
  </select>
  <select id="f-tipo" onchange="render()">
    <option value="">Todos os tipos</option>
    <option>MP</option>
    <option>Manutenção Predial</option>
    <option>Ar Condicionado</option>
    <option>Outros</option>
  </select>
  <button class="btn-nova" onclick="openModal()">＋ Nova Demanda</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Nº SEI / Protocolo</th>
        <th>Solicitante</th>
        <th>Descrição</th>
        <th>Município</th>
        <th>Tipo</th>
        <th>Origem</th>
        <th>Prazo</th>
        <th>Prioridade</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nova Demanda</h2>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-row">
      <div class="fgroup" style="flex:2">
        <label>Nº SEI / Protocolo</label>
        <input type="text" id="f-sei" placeholder="Ex: 00450.001234/2025-01">
      </div>
      <div class="fgroup">
        <label>Origem</label>
        <select id="f-origem">
          <option>SEI</option><option>WhatsApp</option><option>Verbal</option><option>Ofício</option><option>E-mail</option>
        </select>
      </div>
      <div class="fgroup">
        <label>Tipo de Demanda</label>
        <select id="f-tipo2">
          <option>MP</option>
          <option>Manutenção Predial</option>
          <option>Ar Condicionado</option>
          <option>Outros</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="fgroup">
        <label>Solicitante</label>
        <input type="text" id="f-sol" placeholder="Nome ou setor solicitante">
      </div>
      <div class="fgroup">
        <label>Município</label>
        <input type="text" id="f-municipio" placeholder="Ex: Teresina">
      </div>
      <div class="fgroup">
        <label>Responsável</label>
        <input type="text" id="f-resp" placeholder="Funcionário responsável">
      </div>
    </div>
    <div class="form-row">
      <div class="fgroup">
        <label>Descrição da Demanda</label>
        <textarea id="f-desc" placeholder="Descreva brevemente a demanda…"></textarea>
      </div>
    </div>
    <div class="form-row">
      <div class="fgroup">
        <label>Prazo</label>
        <input type="date" id="f-prazo">
      </div>
      <div class="fgroup">
        <label>Prioridade</label>
        <select id="f-prio2"><option>Alta</option><option selected>Média</option><option>Baixa</option></select>
      </div>
      <div class="fgroup">
        <label>Status</label>
        <select id="f-st2"><option>Aberta</option><option>Em Andamento</option><option>Concluída</option><option>Atrasada</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="fgroup">
        <label>Observações / Andamento</label>
        <textarea id="f-obs" placeholder="Atualizações, impedimentos, próximos passos…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel2" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="save()">Salvar Demanda</button>
    </div>
  </div>
</div>

    { id:34, sei:'00027.004430/2023-05', origem:'SEI', tipo:'Manutenção Predial', sol:'Núcleo Científico Piripiri', resp:'', desc:'Núcleo Científico Piripiri', prazo:'', prio:'Média', status:'Aberta', obs:'', municipio:'Piripiri' },
    { id:35, sei:'', origem:'SEI', tipo:'Manutenção Predial', sol:'ROCAM', resp:'', desc:'ROCAM', prazo:'', prio:'Média', status:'Aberta', obs:'', municipio:'Teresina' },
    { id:36, sei:'', origem:'SEI', tipo:'Manutenção Predial', sol:'Cavalaria PM', resp:'', desc:'Cavalaria PM', prazo:'', prio:'Média', status:'Aberta', obs:'', municipio:'Teresina' },
    { id:37, sei:'', origem:'SEI', tipo:'Manutenção Predial', sol:'BOPE', resp:'', desc:'BOPE', prazo:'', prio:'Média', status:'Aberta', obs:'', municipio:'Teresina' },
    { id:38, sei:'00027.001351/2026-87', origem:'SEI', tipo:'Manutenção Predial', sol:'Diretoria de Polícia Comunitária', resp:'', desc:'Diretoria de Polícia Comunitária - reparos em 3 salas (Diretor, Colaboradores e Conset\'s)', prazo:'', prio:'Média', status:'Aberta', obs:'', municipio:'Teresina' },
    { id:39, sei:'00019.034704/2025-43', origem:'SEI', tipo:'Manutenção Predial', sol:'UISP Elesbão Veloso', resp:'', desc:'UISP Elesbão Veloso - manutenção corretiva da fossa séptica', prazo:'', prio:'Média', status:'Aberta', obs:'', municipio:'Elesbão Veloso' },
    // ── Ar Condicionado ──
    { id:40, sei:'00028.011354/2026-19', origem:'SEI', tipo:'Ar Condicionado', sol:'29º BPM', resp:'', desc:'29º BPM - aparelho de ar-condicionado da recepção do quartel não está funcionando', prazo:'', prio:'Média', status:'Aberta', obs:'', municipio:'(verificar)' },
  ];
  let nextId = 41;
  let editId = null;

  // ---------- UTILS ----------
  const today = () => new Date().toISOString().slice(0,10);

  function fmtDate(d) {
    if (!d) return '—';
    const [y,m,dia] = d.split('-');
    return `${dia}/${m}/${y}`;
  }

  function stClass(s) { return 'st-' + s.replace(/ /g,'_'); }
  function prClass(p) { return 'pr-' + p; }
  function tpClass(t) { return 'tp-' + t.replace(/ /g,'_'); }

  // Auto-atrasa demandas com prazo vencido
  function checkAtrasadas() {
    const hj = today();
    demandas = demandas.map(d => {
      if (d.status !== 'Concluída' && d.prazo && d.prazo < hj)
        return { ...d, status: 'Atrasada' };
      return d;
    });
  }

  // ---------- RENDER CARDS ----------
  function renderCards() {
    const tot = demandas.length;
    const ab  = demandas.filter(d=>d.status==='Aberta').length;
    const an  = demandas.filter(d=>d.status==='Em Andamento').length;
    const co  = demandas.filter(d=>d.status==='Concluída').length;
    const at  = demandas.filter(d=>d.status==='Atrasada').length;
    document.getElementById('summary').innerHTML = `
      <div class="scard total"><div class="scard-num">${tot}</div><div class="scard-label">Total</div></div>
      <div class="scard aberta"><div class="scard-num">${ab}</div><div class="scard-label">Abertas</div></div>
      <div class="scard andamento"><div class="scard-num">${an}</div><div class="scard-label">Em Andamento</div></div>
      <div class="scard concluida"><div class="scard-num">${co}</div><div class="scard-label">Concluídas</div></div>
      <div class="scard atrasada"><div class="scard-num">${at}</div><div class="scard-label">Atrasadas</div></div>
    `;
  }

  // ---------- RENDER TABLE ----------
  function render() {
    checkAtrasadas();
    renderCards();
    const q    = document.getElementById('busca').value.toLowerCase();
    const fst  = document.getElementById('f-status').value;
    const fpr  = document.getElementById('f-prio').value;
    const ftp  = document.getElementById('f-tipo').value;

    let list = demandas.filter(d => {
      const txt = (d.sei+d.sol+d.resp+d.desc+(d.municipio||'')).toLowerCase();
      return txt.includes(q)
        && (!fst || d.status===fst)
        && (!fpr || d.prio===fpr)
        && (!ftp || d.tipo===ftp);
    });

    const tbody = document.getElementById('tbody');
    if (list.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="10">Nenhuma demanda encontrada.</td></tr>`;
      return;
    }

    tbody.innerHTML = list.map(d => `
      <tr>
        <td><span class="sei-code">${d.sei || '—'}</span></td>
        <td>${d.sol}</td>
        <td><div class="desc-cell" title="${d.desc}">${d.desc}</div></td>
        <td style="white-space:nowrap;font-size:12px;">${d.municipio || '—'}</td>
        <td><span class="badge-tipo ${tpClass(d.tipo)}">${d.tipo}</span></td>
        <td><span class="badge-origem">${d.origem}</span></td>
        <td style="font-size:12px;font-family:'DM Mono',monospace;white-space:nowrap;">${fmtDate(d.prazo)}</td>
        <td><span class="badge-prio ${prClass(d.prio)}">${d.prio}</span></td>
        <td><span class="badge-status ${stClass(d.status)}">${d.status}</span></td>
        <td style="white-space:nowrap;">
          <button class="btn-act" title="Editar" onclick="openModal(${d.id})">✏️</button>
          <button class="btn-act" title="Excluir" onclick="del(${d.id})">🗑️</button>
        </td>
      </tr>
    `).join('');
  }

  // ---------- MODAL ----------
  function openModal(id=null) {
    editId = id;
    if (id) {
      const d = demandas.find(x=>x.id===id);
      document.getElementById('modal-title').textContent = 'Editar Demanda';
      document.getElementById('f-sei').value   = d.sei;
      document.getElementById('f-origem').value= d.origem;
      document.getElementById('f-tipo2').value = d.tipo;
      document.getElementById('f-sol').value   = d.sol;
      document.getElementById('f-municipio').value = d.municipio || '';
      document.getElementById('f-resp').value  = d.resp;
      document.getElementById('f-desc').value  = d.desc;
      document.getElementById('f-prazo').value = d.prazo;
      document.getElementById('f-prio2').value = d.prio;
      document.getElementById('f-st2').value   = d.status;
      document.getElementById('f-obs').value   = d.obs;
    } else {
      document.getElementById('modal-title').textContent = 'Nova Demanda';
      ['f-sei','f-sol','f-municipio','f-resp','f-desc','f-obs'].forEach(id => document.getElementById(id).value='');
      document.getElementById('f-origem').value= 'SEI';
      document.getElementById('f-tipo2').value = 'MP';
      document.getElementById('f-prazo').value = '';
      document.getElementById('f-prio2').value = 'Média';
      document.getElementById('f-st2').value   = 'Aberta';
    }
    document.getElementById('modal-bg').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
    editId = null;
  }
  document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-bg')) closeModal();
  });

  function save() {
    const d = {
      id:     editId || nextId++,
      sei:    document.getElementById('f-sei').value   || '—',
      origem: document.getElementById('f-origem').value,
      tipo:   document.getElementById('f-tipo2').value,
      sol:    document.getElementById('f-sol').value   || '—',
      municipio: document.getElementById('f-municipio').value || '—',
      resp:   document.getElementById('f-resp').value  || '—',
      desc:   document.getElementById('f-desc').value  || '—',
      prazo:  document.getElementById('f-prazo').value,
      prio:   document.getElementById('f-prio2').value,
      status: document.getElementById('f-st2').value,
      obs:    document.getElementById('f-obs').value,
    };
    if (editId) demandas = demandas.map(x => x.id===editId ? d : x);
    else demandas.push(d);
    closeModal();
    render();
  }

  function del(id) {
    if (confirm('Deseja excluir esta demanda?')) {
      demandas = demandas.filter(x=>x.id!==id);
      render();
    }
  }

  // ---------- HEADER DATE ----------
  const now = new Date();
  document.getElementById('hdr-date').textContent =
    now.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });

  // ---------- INIT ----------
  render();
</script>
